name: Generate Content

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Curate articles
        run: npm run curate

      - name: Cluster articles
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npm run cluster

      - name: Synthesize stories
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npm run synthesize

      - name: Check if Saturday
        id: day_info
        run: |
          DAY_OF_WEEK=$(date -u +%u)
          IS_SATURDAY=$([[ "$DAY_OF_WEEK" == "6" ]] && echo "true" || echo "false")
          echo "is_saturday=$IS_SATURDAY" >> $GITHUB_OUTPUT
          echo "📅 Day of week: $DAY_OF_WEEK (Saturday: $IS_SATURDAY)"

      - name: Generate weekly edition
        if: steps.day_info.outputs.is_saturday == 'true'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: npm run generate-weekly

      - name: Commit and push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add public/data/stories.json data/raw-articles.json data/clustered-articles.json
          [ -f public/data/weekly-stories.json ] && git add public/data/weekly-stories.json || true
          git diff --staged --quiet || git commit -m "chore: update stories $(date +'%Y-%m-%d')"
          git push

      - name: Trigger Vercel deploy
        if: ${{ vars.VERCEL_DEPLOY_HOOK }}
        run: |
          curl -X POST "${{ vars.VERCEL_DEPLOY_HOOK }}"
